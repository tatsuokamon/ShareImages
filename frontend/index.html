<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Share App</title>
  <script type="module" src="/src/main.ts"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    .post {
      border: 1px solid #ccc;
      padding: 8px;
      margin: 8px 0;
    }
  </style>
</head>

<body>
  <div x-data="app()" x-init="init()">

    <!-- ========================= -->
    <!-- エラー表示 -->
    <!-- ========================= -->
    <template x-if="state.status !== 'ok'">
      <div style="color:red">
        Error: <span x-text="state.status"></span>
      </div>
    </template>

    <!-- ========================= -->
    <!-- 未参加 -->
    <!-- ========================= -->
    <div x-show="!state.joining_room">
      <h2>ルーム参加</h2>

      <input
        x-model="keyword"
        placeholder="keyword"
      />

      <button
        @click="join_room_as_slave_with_keyword(keyword)"
      >
        入る
      </button>
    </div>

    <!-- ========================= -->
    <!-- 参加中 -->
    <!-- ========================= -->
    <div x-show="state.joining_room">

      <h2>
        Room:
        <span x-text="state.joining_room?.keyword"></span>
      </h2>

      <div>
        人数:
        <span x-text="state.joining_room?.how_many"></span>
      </div>

      <!-- ========================= -->
      <!-- コメント投稿 -->
      <!-- ========================= -->
      <h3>コメント投稿</h3>

      <input
        x-model="state.comment"
        placeholder="コメント"
      />

      <button @click="post_comment()">
        送信
      </button>

      <!-- ========================= -->
      <!-- 画像投稿（簡易） -->
      <!-- ========================= -->
      <h3>画像投稿</h3>

      <input
        type="text"
        x-model="state.title"
        placeholder="タイトル"
      />

      <input
        type="file"
        @change="file = $event.target.files[0]"
      />

      <button
        @click="get_presigned_url(file?.size || 0)"
      >
        URL取得
      </button>

      <button @click="post_img()">
        投稿
      </button>

      <!-- ========================= -->
      <!-- 投稿一覧 -->
      <!-- ========================= -->
      <h3>投稿一覧</h3>

      <template x-for="post in state.displaying_posts" :key="post.id">

        <div class="post">

          <!-- コメント -->
          <template x-if="post.content !== undefined">
            <div>
              <b x-text="post.display_name"></b> :
              <span x-text="post.content"></span>
            </div>
          </template>

          <!-- 画像 -->
          <template x-if="post.object_key !== undefined">
            <div>
              <div>
                <span x-text="post.title"></span>
              </div>

              <img
                :src="`/api/image/${post.object_key}`"
                width="200"
              />

              <div>
                score:
                <span x-text="post.score"></span>
              </div>
            </div>
          </template>

        </div>

      </template>

    </div>

  </div>
</body>
</html>
